<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Esküvői Meghívó</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: black;
    }

    .slider {
      display: flex;
      width: 400vw;
      height: 100dvh;
      transition: transform 0.6s ease;
    }

    .slide {
      width: 100vw;
      height: 100dvh;
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      animation: fadeIn 1s forwards;
    }

    .slide img {
      width: auto;
      height: 100dvh;
      max-width: 100vw;
      object-fit: contain;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .nav {
      position: fixed;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
    }

    .dot.active {
      background: white;
    }

    .arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 40px;
      /* color: rgba(255,255,255,0.3); */
      color:#a2b3a3;
      cursor: pointer;
      user-select: none;
      padding: 10px;
      transition: 0.3s;
    }

    .arrow:hover {
      /* color: rgba(255,255,255,0.8); */
    color:#728776;
    }

    .arrow.left {
      left: 10px;
    }

    .arrow.right {
      right: 10px;
    }
  </style>
</head>
<body>

  <div class="slider" id="slider">
    <div class="slide"><img src="img1.jpg" /></div>
    <div class="slide"><img src="img2.jpg" /></div>
    <div class="slide"><img src="img3.jpg" /></div>
    <div class="slide"><img src="img4.jpg" /></div>
  </div>

<div class="arrow left" onclick="prev()">❮</div>
<div class="arrow right" onclick="next()">❯</div>

<div class="nav">
  <div class="dot active"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<script>
  let current = 0;
  const slider = document.getElementById('slider');
  const dots = document.querySelectorAll('.dot');

  function update() {
    slider.style.transform = `translateX(-${current * 100}vw)`;
    dots.forEach((d, i) => d.classList.toggle('active', i === current));
  }

  function next() {
    if (current < 3) {
      current++;
      update();
    }
  }

  function prev() {
    if (current > 0) {
      current--;
      update();
    }
  }

  let startX = 0;

  document.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
  });

  document.addEventListener('touchend', e => {
    let endX = e.changedTouches[0].clientX;
    let diff = startX - endX;

    if (diff > 50) next();
    if (diff < -50) prev();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') next();
    if (e.key === 'ArrowLeft') prev();
  });
</script>

</body>
</html>
